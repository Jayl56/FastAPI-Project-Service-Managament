version: "3.9"

services:
  db:
    image: postgres:14
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}

  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      RUN_TESTS: "true"
    depends_on:
      - db